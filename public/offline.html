<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life OS — Offline</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f9fafb;
      color: #111827;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.5rem; }
    p { color: #6b7280; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶</div>
    <h1>You're offline</h1>
    <p>Your data is saved locally.<br />Changes will sync when you reconnect.</p>
  </div>
</body>
</html>
